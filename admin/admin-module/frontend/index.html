<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Odoo Cafe — Admin Portal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style id="loader-style">
      /* ── Design Tokens ─────────────────────────────────── */
      :root {
        --canvas:    #FFF9EB;
        --sage:      #9FB2AC;
        --blood:     #5D0D18;
        --sage-20:   rgba(159, 178, 172, 0.20);
      }

      #app-loader, #app-loader * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      #app-loader {
        position: fixed;
        inset: 0;
        z-index: 9999;
        background: var(--canvas);
        font-family: 'Inter', system-ui, sans-serif;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        overflow: hidden;
      }

      #app-loader .stage {
        position: relative;
        width: 400px;
        height: 450px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }

      #app-loader .sage-halo {
        position: absolute;
        bottom: 112px;
        width: 220px;
        height: 18px;
        background: transparent;
        border: 1.5px solid var(--sage);
        border-radius: 50%;
        opacity: 0.5;
        z-index: 1;
        animation: haloBreath 2.5s infinite ease-in-out;
      }

      @keyframes haloBreath {
        0%,100% { transform: scale(0.95); opacity: 0.35; }
        50%      { transform: scale(1.10); opacity: 0.18; }
      }

      #app-loader .logo-frame {
        position: relative;
        width: 220px;
        height: 290px;
        z-index: 2;
        animation: gentleBob 2.6s infinite ease-in-out;
      }

      @keyframes gentleBob {
        0%, 100% { transform: translateY(0px); }
        50%       { transform: translateY(-7px); }
      }

      #app-loader .logo-img {
        width: 100%;
        height: 100%;
        object-fit: contain;
        display: block;
      }

      #app-loader .steam-svg {
        position: absolute;
        top: 22px;
        right: 34px;
        width: 60px;
        height: 100px;
        overflow: visible;
        z-index: 3;
        pointer-events: none;
      }

      #app-loader .steam-svg .steam-line {
        fill: none;
        stroke: var(--blood);
        stroke-width: 2.5px;
        stroke-linecap: round;
        stroke-linejoin: round;
        stroke-dasharray: 120;
        stroke-dashoffset: 120;
        opacity: 0;
      }

      #app-loader .steam-svg .s1 {
        animation: steamDraw 2.4s infinite ease-in-out;
      }

      #app-loader .steam-svg .s2 {
        animation: steamDraw 2.4s 1.2s infinite ease-in-out;
      }

      @keyframes steamDraw {
        0%   { stroke-dashoffset: 120; opacity: 0; }
        15%  { opacity: 0.85; }
        55%  { stroke-dashoffset: 0;   opacity: 0.7; }
        85%  { stroke-dashoffset: 0;   opacity: 0; }
        100% { stroke-dashoffset: 120; opacity: 0; }
      }

      #app-loader .brew-text {
        margin-top: 24px;
        font-family: 'Inter', system-ui, sans-serif;
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 4px;
        text-transform: uppercase;
        color: var(--blood);
        z-index: 4;
        animation: textBreath 2s infinite ease-in-out;
      }

      @keyframes textBreath {
        0%, 100% { opacity: 0.4; }
        50%       { opacity: 1.0; }
      }

      #app-loader .progress-track {
        margin-top: 16px;
        width: 160px;
        height: 2px;
        background: var(--sage-20);
        border-radius: 99px;
        overflow: hidden;
        z-index: 4;
      }

      #app-loader .progress-fill {
        height: 100%;
        width: 45%;
        background: linear-gradient(90deg, var(--sage), var(--blood));
        border-radius: 99px;
        animation: progressSlide 2.4s infinite ease-in-out;
      }

      @keyframes progressSlide {
        0%   { transform: translateX(-120%); }
        50%  { transform: translateX(60%);   }
        100% { transform: translateX(250%);  }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="app-loader">
        <div class="stage">
          <div class="sage-halo"></div>
          <div class="logo-frame">
            <img class="logo-img" src="/loading-logo.png" alt="Odoo Cafe">
            <svg class="steam-svg" viewBox="0 0 60 100" xmlns="http://www.w3.org/2000/svg">
              <path class="steam-line s1"
                d="M 30 95 C 30 80, 10 72, 18 55 C 26 38, 46 32, 36 15 C 28 4, 20 2, 22 0" />
              <path class="steam-line s2"
                d="M 42 90 C 42 76, 24 68, 32 52 C 40 36, 56 30, 48 14 C 42 4, 34 2, 36 0" />
            </svg>
          </div>
          <div class="brew-text">Brewing Your Experience</div>
          <div class="progress-track">
            <div class="progress-fill"></div>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
